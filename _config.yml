# ============================================================================
# CognitiveCTI Blog — Jekyll Configuration
# A threat intelligence blog powered by the CognitiveCTI pipeline
# https://github.com/jwhitt3r/cognitiveCTI
# ============================================================================

title: OverResearched Intelligence
tagline: "Automated Threat Intelligence — Daily · Weekly · Monthly"
description: >-
  Structured cyber threat intelligence generated by the CognitiveCTI pipeline.
  Daily briefs, weekly summaries, monthly landscapes, and bespoke analyses
  delivered as static, machine-readable content with full RSS support.

url: "https://intel.overresearched.net"
baseurl: ""

author:
  name: "Jack Whitter-Jones"
  email: "" # Optional: your team contact

# Build
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/
timezone: UTC

kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Sass
sass:
  style: compressed
  sass_dir: _sass

# Collections — organise intel by cadence
collections:
  analyses:
    output: true
    permalink: /analyses/:title/

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      category: "daily"
  - scope:
      path: ""
      type: "analyses"
    values:
      layout: "post"
      category: "analysis"
  - scope:
      path: "pages"
      type: "pages"
    values:
      layout: "page"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Feed configuration
feed:
  posts_limit: 50
  excerpt_only: false

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache

# Security: strip unnecessary metadata
safe: false
future: true 
show_drafts: false

# Navigation categories for filtering
intel_categories:
  - slug: daily
    name: Daily Briefs
    description: 24-hour intelligence summaries
  - slug: weekly
    name: Weekly Reports
    description: 7-day threat landscape overviews
  - slug: monthly
    name: Monthly Landscapes
    description: 30-day strategic assessments
  - slug: analysis
    name: Bespoke Analyses
    description: Deep-dive trend and campaign analysis
