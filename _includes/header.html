<header class="site-header" role="banner">
  <div class="container container--wide site-header__inner">
    <a class="site-header__brand" href="{{ '/' | relative_url }}">
      <span class="site-header__brand-mark" aria-hidden="true">ORI</span>
      {{ site.title }}
    </a>

    <button class="site-header__menu-toggle" aria-label="Toggle navigation" aria-expanded="false" onclick="this.setAttribute('aria-expanded', this.getAttribute('aria-expanded') === 'false' ? 'true' : 'false'); document.getElementById('main-nav').classList.toggle('is-open');">
      <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" d="M3 5h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2z"/>
      </svg>
    </button>

    <nav id="main-nav" class="site-header__nav" role="navigation" aria-label="Main navigation">
      <a class="site-header__link" href="{{ '/about' | relative_url }}">About</a>
      <a class="site-header__link{% if page.url == '/search/' %} active{% endif %}" href="{{ '/search/' | relative_url }}" title="Search intelligence">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 1rem; height: 1rem;" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <span class="sr-only">Search</span>
      </a>
      <a class="site-header__link site-footer__rss" href="{{ '/feed.xml' | relative_url }}" title="RSS Feed">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 11a9 9 0 019 9"/><path d="M4 4a16 16 0 0116 16"/><circle cx="5" cy="19" r="1"/>
        </svg>
        <span class="sr-only">RSS</span>
      </a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" type="button">
        <svg class="theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </nav>
  </div>
</header>
